name: E2E Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    env:
      TEST_URL: ${{ secrets.TEST_URL }}
      TEST_API_URL: ${{ secrets.TEST_API_URL }}
      TEST_SEED_SECRET: ${{ secrets.TEST_SEED_SECRET }}
      TEST_MANAGER_EMAIL: ${{ secrets.TEST_MANAGER_EMAIL }}
      TEST_MANAGER_PASSWORD: ${{ secrets.TEST_MANAGER_PASSWORD }}
      TEST_LEARNER_EMAIL: ${{ secrets.TEST_LEARNER_EMAIL }}
      TEST_LEARNER_PASSWORD: ${{ secrets.TEST_LEARNER_PASSWORD }}
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: apps/web

      - name: Build app
        run: pnpm build
        working-directory: apps/web

      - name: Start API (background)
        run: pnpm start:test &
        working-directory: apps/api

      - name: Wait for API to be ready
        run: npx wait-on http://localhost:3001/health --timeout=30000

      - name: Run E2E tests
        run: pnpm test:e2e --project=chromium
        working-directory: apps/web

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload test screenshots (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: apps/web/test-results/
