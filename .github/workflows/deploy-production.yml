name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # Runs the full CI suite first
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-web-production:
    name: Deploy Web → Vercel Production
    needs: ci
    runs-on: ubuntu-latest
    environment: production   # ← requires manual approval in GitHub
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Deploy to Vercel (Production)
        run: |
          pnpm add -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-api-production:
    name: Deploy API → Railway Production
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Run DB migrations
        run: pnpm --filter api exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Deploy to Railway
        run: |
          npm install -g @railway/cli
          railway up --service=api-production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-ai-production:
    name: Deploy AI → Railway Production
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy AI to Railway
        run: |
          npm install -g @railway/cli
          railway up --service=ai-production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
